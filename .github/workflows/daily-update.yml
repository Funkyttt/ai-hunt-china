name: 每日 AI 产品更新

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-products-daily-update
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 采集并分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python collector.py
      - name: 保存今日榜单
        run: |
          git config user.name "ai-hunt-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "data: update daily AI products"
          git push
