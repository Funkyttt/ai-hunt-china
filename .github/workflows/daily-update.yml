name: 每日 AI 产品更新

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Shanghai"
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-update.yml"
      - "collector.py"
  workflow_dispatch:
    inputs:
      target_date:
        description: "可选：补录日期（YYYY-MM-DD），留空则更新今天"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ai-products-daily-update
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 采集并分析
        id: collect
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python collector.py --date "$TARGET_DATE"
          else
            python collector.py
          fi
      - name: 保存今日榜单与运行状态
        if: always()
        run: |
          git config user.name "ai-hunt-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json data/history/*.json assets/logos/*
          git diff --cached --quiet || git commit -m "data: update daily AI products"
          git push
      - name: 检查采集结果
        if: steps.collect.outcome == 'failure'
        run: exit 1
